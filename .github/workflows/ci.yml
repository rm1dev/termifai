name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint (fmt, clippy, typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux Tauri build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo fmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - uses: oven-sh/setup-bun@v2
      - name: Install frontend deps
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsc --noEmit

  test:
    name: Backend tests (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets

  build:
    name: Build (${{ matrix.os }})
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: oven-sh/setup-bun@v2
      - name: Install frontend deps
        run: bun install --frozen-lockfile
      - name: Build (no bundle signing)
        run: bunx tauri build --no-bundle
